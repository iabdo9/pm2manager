<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Sign in · PM2 Manager</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="/static/js/theme.js"></script>
</head>
<body class="auth-body">

  <div class="auth-topbar">
    <button type="button" class="icon-btn bordered theme-toggle" data-theme-toggle aria-label="Toggle theme">
      <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 13.2A8.3 8.3 0 1 1 10.8 3.5 6.5 6.5 0 0 0 20.5 13.2Z"/></svg>
      <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/><line x1="5.2" y1="5.2" x2="7" y2="7"/><line x1="17" y1="17" x2="18.8" y2="18.8"/><line x1="5.2" y1="18.8" x2="7" y2="17"/><line x1="17" y1="7" x2="18.8" y2="5.2"/></svg>
    </button>
  </div>

  <main class="auth-card">
    <div class="auth-logo">
      <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true"><rect width="32" height="32" rx="8" fill="#3b5bd9"/><circle cx="10" cy="11" r="2" fill="#34d399"/><rect x="14" y="10" width="9" height="2" rx="1" fill="#fff"/><rect x="9" y="16" width="14" height="2" rx="1" fill="#fff" fill-opacity="0.85"/><rect x="9" y="21" width="14" height="2" rx="1" fill="#fff" fill-opacity="0.6"/></svg>
      <span class="brand-name">PM2&nbsp;<b>Manager</b></span>
    </div>

    <form id="login-form" class="form" autocomplete="on" novalidate>
      <h1 class="auth-title">Sign in</h1>
      <p class="auth-subtitle">Manage your PM2 processes</p>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn primary block" id="login-submit">Sign in</button>
    </form>

    <form id="twofa-form" class="form hidden" novalidate>
      <h1 class="auth-title">Two-factor authentication</h1>
      <p class="auth-subtitle">Enter the 6-digit code from your authenticator app</p>
      <div class="field">
        <label for="twofa-code">Authentication code</label>
        <input id="twofa-code" name="token" type="text" inputmode="numeric" autocomplete="one-time-code"
               pattern="\d{6}" maxlength="6" placeholder="123456" required>
      </div>
      <button type="submit" class="btn primary block" id="twofa-submit">Verify</button>
      <button type="button" class="btn block auth-back" id="twofa-back">Back</button>
    </form>

    <div id="login-error" class="auth-error hidden" role="alert">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><line x1="12" y1="9" x2="12" y2="13.5"/><line x1="12" y1="17.5" x2="12.01" y2="17.5"/></svg>
      <span id="login-error-text"></span>
    </div>
  </main>

  <script src="/static/js/login.js"></script>
</body>
</html>
